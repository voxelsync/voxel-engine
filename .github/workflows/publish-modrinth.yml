name: Publish to Modrinth on Release

on:
  release:
    types: [published]  # Trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse Release Description
        id: parse-release
        run: |
          # Extrahiere Metadaten aus der Release-Beschreibung
          FILE=$(grep -oP '(?<=file: ).*' <<< "${{ github.event.release.body }}")
          LOADERS=$(grep -oP '(?<=loaders: ).*' <<< "${{ github.event.release.body }}")
          GAME_VERSIONS=$(grep -oP '(?<=game-versions: ).*' <<< "${{ github.event.release.body }}")
          VERSION_TYPE=$(grep -oP '(?<=version-type: ).*' <<< "${{ github.event.release.body }}" || echo "release")

          # Setze Outputs für den nächsten Schritt
          echo "file=${FILE}" >> $GITHUB_OUTPUT
          echo "loaders=${LOADERS}" >> $GITHUB_OUTPUT
          echo "game-versions=${GAME_VERSIONS}" >> $GITHUB_OUTPUT
          echo "version-type=${VERSION_TYPE}" >> $GITHUB_OUTPUT

      - name: Upload to Modrinth
        uses: modrinth/action@v3
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project-id: "voxel-engine"
          file: ${{ steps.parse-release.outputs.file }}
          version: ${{ github.ref_name }}
          version-type: ${{ steps.parse-release.outputs.version-type }}
          loaders: ${{ steps.parse-release.outputs.loaders }}
          game-versions: ${{ steps.parse-release.outputs.game-versions }}
          changelog: ${{ github.event.release.body }}
